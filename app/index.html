<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236B1A2A'/%3E%3Ctext x='32' y='43' font-family='Georgia,serif' font-size='26' font-weight='700' text-anchor='middle' fill='%23D4A85A'%3ETM%3C/text%3E%3C/svg%3E" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Club Executive Platform</title>
    <style>
      html, body { background: #FAF7F2; color: #2E211C; margin: 0; }
      #root { min-height: 100vh; }
      #app-boot { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      #app-boot::before {
        content: '';
        width: 32px; height: 32px;
        border: 2px solid rgba(107, 26, 42, 0.2);
        border-top-color: #6B1A2A;
        border-radius: 50%;
        animation: appBootSpin 0.7s linear infinite;
      }
      @keyframes appBootSpin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><div id="app-boot"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
